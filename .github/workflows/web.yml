name: Deploy Web Version

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -U pygbag pygame-ce

      - name: Build web version
        run: |
          pygbag --build --ume_block=0 MakeKing.py
          
      - name: Verify build output
        run: |
          if [ ! -d "build/web" ]; then
            echo "Web build failed!"
            exit 1
          fi
          
      - name: Prepare Pages artifact
        run: |
          mkdir -p pages
          cp -r build/web/* pages/
      
          # Ensure assets are included
          if [ -d "assets" ]; then
            cp -r assets pages/assets
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
