name: Build MakeKing

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            zip_name: MakeKing-windows.zip

          - os: ubuntu-latest
            platform: linux
            zip_name: MakeKing-linux.zip

    runs-on: ${{ matrix.os }}

    steps:
      # ============================
      # CHECKOUT
      # ============================

      - name: Checkout repository
        uses: actions/checkout@v4

      # ============================
      # PYTHON
      # ============================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller pygame

      # ============================
      # CLEAN PREVIOUS BUILDS
      # ============================

      - name: Clean previous builds (Windows)
        if: matrix.platform == 'windows'
        shell: cmd
        run: |
          echo ============================
          echo   Building MakeKing (Safe)
          echo ============================

          rmdir /s /q build
          rmdir /s /q dist

          if exist MakeKing.spec del MakeKing.spec

      - name: Clean previous builds (Linux)
        if: matrix.platform == 'linux'
        run: |
          echo "============================"
          echo "  Building MakeKing (Safe)"
          echo "============================"

          rm -rf build
          rm -rf dist
          rm -f MakeKing.spec

      # ============================
      # BUILD WINDOWS
      # ============================

      - name: Build with PyInstaller (Windows)
        if: matrix.platform == 'windows'
        shell: cmd
        run: |
          pyinstaller ^
          -y ^
          --noconsole ^
          --name MakeKing ^
          --icon=assets\sprites\icon.ico ^
          --add-data "assets;assets" ^
          --version-file version.txt ^
          --noupx ^
          MakeKing.py

      # ============================
      # BUILD LINUX
      # ============================

      - name: Build with PyInstaller (Linux)
        if: matrix.platform == 'linux'
        run: |
          pyinstaller \
          -y \
          --noconsole \
          --name MakeKing \
          --icon=assets/sprites/icon.png \
          --add-data "assets:assets" \
          --noupx \
          MakeKing.py

      # ============================
      # COPY README FILES
      # ============================

      - name: Copy README files (Windows)
        if: matrix.platform == 'windows'
        shell: cmd
        run: |
          echo Copying README files...

          for %%F in (README_*.txt) do (
              if exist "%%F" (
                  copy "%%F" "dist\MakeKing\"
              )
          )

      - name: Copy README files (Linux)
        if: matrix.platform == 'linux'
        run: |
          echo "Copying README files..."
          cp README_*.txt dist/MakeKing/ || true

      # ============================
      # COPY ASSETS
      # ============================

      - name: Copy assets folder (Windows)
        if: matrix.platform == 'windows'
        shell: cmd
        run: |
          echo Copying assets folder...
          xcopy "assets" "dist\MakeKing\assets" /E /I /Y >nul

      - name: Copy assets folder (Linux)
        if: matrix.platform == 'linux'
        run: |
          echo "Copying assets folder..."
          rm -rf dist/MakeKing/assets
          mkdir -p dist/MakeKing
          cp -r assets dist/MakeKing/

      # ============================
      # ZIP WINDOWS
      # ============================

      - name: Create ZIP (Windows)
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          Compress-Archive `
            -Path 'dist\MakeKing' `
            -DestinationPath 'dist\MakeKing-windows.zip' `
            -Force

      # ============================
      # ZIP LINUX
      # ============================

      - name: Create ZIP (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd dist
          zip -r MakeKing-linux.zip MakeKing

      # ============================
      # UPLOAD ARTIFACT
      # ============================

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MakeKing-${{ matrix.platform }}
          path: dist/${{ matrix.zip_name }}

      # ============================
      # RELEASE
      # ============================

      - name: Release build
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: dist/${{ matrix.zip_name }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
